name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          echo "Simulating Docker build"
          docker --version

      - name: Simulate Push
        run: echo "Image pushed successfully"

      - name: Trigger Deployment API
        run: |
          curl -X POST http://127.0.0.1:8000/deploy \
          -H "Content-Type: application/json" \
          -d '{
            "app_name": "ci-app",
            "docker_image": "nginx:latest",
            "environment": "dev"
          }'