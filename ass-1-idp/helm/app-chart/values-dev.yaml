appName: sample-app

environment: dev

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

labels:
  team: platform
  managedBy: idp

annotations: {}

config:
  APP_ENV: dev
  APP_NAME: sample-app

secretData:
  DB_PASSWORD: dev-password