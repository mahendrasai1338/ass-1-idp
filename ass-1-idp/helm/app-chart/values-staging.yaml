appName: sample-app

environment: staging

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: "150m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

labels:
  team: platform
  managedBy: idp

annotations: {}

config:
  APP_ENV: staging
  APP_NAME: sample-app

secretData:
  DB_PASSWORD: staging-password