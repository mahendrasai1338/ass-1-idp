appName: sample-app

environment: prod

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

labels:
  team: platform
  managedBy: idp

annotations: {}

config:
  APP_ENV: prod
  APP_NAME: sample-app

secretData:
  DB_PASSWORD: prod-password